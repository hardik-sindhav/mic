
name: Deploy on Merge

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin_panel/package-lock.json

      - name: Install dependencies
        working-directory: admin_panel
        run: npm ci

      - name: Build frontend
        working-directory: admin_panel
        env:
          VITE_API_URL: https://api.mic.xfinai.cloud
        run: npm run build

      - name: Setup SSH
        env:
          VPS_PRIVATE_KEY: ${{ secrets.VPS_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts

      - name: Deploy frontend to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_FRONTEND_PATH: ${{ secrets.VPS_FRONTEND_PATH }}
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" admin_panel/dist/ $VPS_USER@$VPS_HOST:$VPS_FRONTEND_PATH/

      - name: Done frontend deploy
        run: echo "Frontend deployed"

  build-and-deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Setup SSH
        env:
          VPS_PRIVATE_KEY: ${{ secrets.VPS_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts

      - name: Deploy backend to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
        run: |
          ssh -i ~/.ssh/id_ed25519 $VPS_USER@$VPS_HOST << 'EOF'
            set -e

            echo "Backend Deploy Start"

            cd $VPS_APP_PATH

            git fetch origin
            git reset --hard origin/main

            cd backend
            npm ci

            pm2 restart mic-backend || pm2 start src/server.js --name mic-backend

            echo "Backend Deploy Done"
          EOF

      - name: Health Check
        run: |
          sleep 3
          curl -f https://api.mic.xfinai.cloud || exit 1

      - name: Done backend deploy
        run: echo "Backend deployed"

  notify:
    runs-on: ubuntu-latest
    needs:
      - build-and-deploy-frontend
      - build-and-deploy-backend

    steps:
      - name: Deployment Summary
        run: |
          echo "Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Frontend: https://admin.mic.xfinai.cloud" >> $GITHUB_STEP_SUMMARY
          echo "Backend: https://api.mic.xfinai.cloud" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

